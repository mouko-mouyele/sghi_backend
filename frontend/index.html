<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGHL — Gestion Hospitalière</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var k = 'sghl-theme', s = localStorage.getItem(k)
        var d = s === 'dark' || ((s === 'system' || !s) && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (d) { document.documentElement.classList.add('dark'); document.documentElement.style.colorScheme = 'dark' }
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
