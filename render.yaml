services:
  - type: web
    name: sghi-backend
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn sghi_backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/sante

    envVars:
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sghi-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sghi-db
          property: connectionString
      - key: FRONTEND_BASE_URL
        value: https://sghi-backend.onrender.com
      - key: SITE_URL
        value: https://sghi-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sghi-backend.onrender.com
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: sghi-db
    plan: free
    databaseName: sghi_db
    user: sghi_user
    ipAllowList: []
