services:
  - type: web
    name: sghi-backend
    runtime: python
    plan: free
    pythonVersion: 3.12
    buildCommand: bash build.sh
    startCommand: gunicorn sghi_backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /

    envVars:
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sghi-backend.onrender.com
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: sghi-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sghi-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sghi-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: sghi-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: FRONTEND_BASE_URL
        value: https://sghi-backend.onrender.com
      - key: SITE_URL
        value: https://sghi-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sghi-backend.onrender.com
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: sghi-db
    plan: free
    databaseName: sghi_db
    user: sghi_user
    ipAllowList: []
