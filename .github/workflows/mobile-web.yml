name: Deploy Flutter Mobile Web

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-web.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-web-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'SghlMobile2026!' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android release keystore
        uses: actions/cache@v4
        id: keystore-cache
        with:
          path: mobile/android/app/sghl-release.jks
          key: sghl-release-keystore-v1

      - name: Generate release keystore
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore mobile/android/app/sghl-release.jks \
            -alias sghl \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=SGHL Mobile, O=SGHL, C=CM"

      - name: Write Android signing config
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=sghl
          storeFile=app/sghl-release.jks
          EOF
          ls -lh mobile/android/app/sghl-release.jks

      - name: Install dependencies
        run: cd mobile && flutter pub get

      - name: Build Flutter Web
        run: |
          cd mobile
          flutter build web --release \
            --base-href=/sghi_backend/ \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Build Android APK (universal)
        run: |
          cd mobile
          flutter build apk --release \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Verify APK signature
        run: |
          APK="mobile/build/app/outputs/flutter-apk/app-release.apk"
          ls -lh "$APK"
          unzip -l "$APK" | grep -E "lib/(armeabi-v7a|arm64-v8a)/libflutter.so"
          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Package APK for download
        run: |
          mkdir -p mobile/build/web/downloads
          cp mobile/build/app/outputs/flutter-apk/app-release.apk mobile/build/web/downloads/sghl-mobile.apk
          touch mobile/build/web/.nojekyll
          ls -lh mobile/build/web/downloads/

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-apk
          name: SGHL Mobile — APK Android (v1.0.3)
          body: |
            Application Android SGHL Mobile (patient & médecin).
            Compatible Infinix Smart 6, Tecno, Samsung, etc.
            API : https://sghi-backend.onrender.com/api/v1

            Infinix Smart 6 (XOS 7.6) :
            1. Désinstallez toute ancienne version SGHL Mobile
            2. Paramètres → Confidentialité → sources inconnues → Chrome + Fichiers
            3. Phone Master → désactiver scan installation
            4. Retéléchargez ce fichier (~45 Mo) en Wi-Fi
          files: mobile/build/web/downloads/sghl-mobile.apk
          make_latest: true
          overwrite_files: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/build/web
          publish_branch: gh-pages
