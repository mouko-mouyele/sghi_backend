name: Deploy Flutter Mobile Web

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-web.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-web-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'SghlMobile2026!' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android release keystore
        uses: actions/cache@v4
        id: keystore-cache
        with:
          path: mobile/android/app/sghl-release.jks
          key: sghl-release-keystore-v1

      - name: Generate release keystore
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore mobile/android/app/sghl-release.jks \
            -alias sghl \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=SGHL Mobile, O=SGHL, C=CM"

      - name: Write Android signing config
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=sghl
          storeFile=app/sghl-release.jks
          EOF

      - name: Install dependencies
        run: cd mobile && flutter pub get

      - name: Build Flutter Web
        run: |
          cd mobile
          flutter build web --release \
            --base-href=/sghi_backend/ \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Build Android APK (32-bit + 64-bit, Infinix / budget phones)
        run: |
          cd mobile
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Package APK for download
        run: |
          mkdir -p mobile/build/web/downloads
          cp mobile/build/app/outputs/flutter-apk/app-release.apk mobile/build/web/downloads/sghl-mobile.apk
          touch mobile/build/web/.nojekyll
          ls -lh mobile/build/web/downloads/

      - name: Remove previous mobile-apk release tag
        run: git push origin :refs/tags/mobile-apk || true

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-apk
          name: SGHL Mobile — APK Android
          body: |
            Application Android SGHL Mobile (patient & médecin).
            API : https://sghi-backend.onrender.com/api/v1

            Si l'installation échoue :
            1. Désinstallez toute ancienne version « SGHL Mobile »
            2. Paramètres → Applications → Chrome → « Installer des apps inconnues » → Autoriser
            3. Retéléchargez l'APK (Wi-Fi recommandé)
          files: mobile/build/web/downloads/sghl-mobile.apk
          make_latest: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/build/web
          publish_branch: gh-pages
