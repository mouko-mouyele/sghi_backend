name: Deploy Flutter Mobile Web

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-web.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-web-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: cd mobile && flutter pub get

      - name: Build Flutter Web
        run: |
          cd mobile
          flutter build web --release \
            --base-href=/sghi_backend/ \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Build Android APK
        run: |
          cd mobile
          flutter build apk --release \
            --dart-define=SGHL_API_URL=https://sghi-backend.onrender.com/api/v1

      - name: Package APK for download
        run: |
          mkdir -p mobile/build/web/downloads
          cp mobile/build/app/outputs/flutter-apk/app-release.apk mobile/build/web/downloads/sghl-mobile.apk
          ls -lh mobile/build/web/downloads/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/build/web
          publish_branch: gh-pages
