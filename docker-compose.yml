version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sghl
      POSTGRES_USER: sghl
      POSTGRES_PASSWORD: sghl_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    environment:
      DEBUG: 'True'
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: sghl
      DB_USER: sghl
      DB_PASSWORD: sghl_secret
      DB_HOST: db
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  pgdata:
